name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Patch package manager protocol
        # Converts pnpm's "workspace:*" to npm's "*" natively so npm install doesn't crash
        run: find . -name "package.json" -not -path "*/node_modules/*" -exec sed -i 's/"workspace:\*"/"*"/g' {} +

      - name: Install dependencies
        # Replaced 'npm ci' with 'npm install' to allow the patched workspaces to link properly
        run: npm install

      - name: Build workspace packages
        run: npm run build -w @guildpass/integration-client -w @guildpass/webhook-utils --if-present

      - name: Run build
        run: npm run build

      - name: Run documentation build
        run: npm run build:docs

      - name: Run linting
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck